        }

        }

            grid-column: span 2;
            background: linear-gradient(135deg, #F97316 0%, #FB923C 100%);

        }

        .summary-card.adquirentes {

        }
        .summary-card.usa {
            background: linear-gradient(135deg, #831843 0%, #EC4899 100%);
            border: none;
        }
        .summary-card.credito {

            border: none;
        }
        .label {

            font-weight: 600;
            color: #94A3B8;

            margin-bottom: 8px;
        }
        .value {
            font-size: 24px;

            color: #E2E8F0;
        }
        .table-container {
            overflow-x: auto;
        }
        table {

        }
        thead th {

            color: #CBD5E1;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;

            letter-spacing: 0.5px;
            border-bottom: 2px solid #334155;

        tbody td {

        }
        tbody tr:nth-child(even) {

        .exchange-rate {

        .exchange-rate-label {
            font-size: 12px;
            color: #94A3B8;

        }
        .exchange-rate-value {

            font-weight: 700;

        }
        .container {

        .loading {

            padding: 40px;

        }
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #EF4444;

            background: rgba(34, 197, 94, 0.1);

            padding: 8px 12px;

        }
        .summary-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
            gap: 16px;
            margin: 20px 0;
        }
        .rechart-wrapper {
            width: 100%;
            height: 400px;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(249, 115, 22, 0.3);
            border-radius: 50%;
            border-top-color: #F97316;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

        const FALLBACK_EXCHANGE_RATES = [
            { id: 1, currency: 'USD', rate: 5.2390 },
            { id: 2, currency: 'EUR', rate: 6.0496 },

        const FALLBACK_SPECIAL_CREDITS = [
            { id: 1, bank_name: 'Itau', credit_type: 'Cta Garantida', credit_limit: 200000 },
            { id: 2, bank_name: 'Daycoval', credit_type: 'Chq. Especial', credit_limit: 150000 },
            { id: 3, bank_name: 'Itau', credit_type: 'Chq Especial', credit_limit: 80000 },
            { id: 4, bank_name: 'BB', credit_type: 'Chq Especial', credit_limit: 150000 },
            { id: 5, bank_name: 'Safra', credit_type: 'Chq Especial', credit_limit: 50000 },
            { id: 6, bank_name: 'C6/Santander', credit_type: 'Crédito', credit_limit: 30000 },
        ];

        // Utility functions
        const formatCurrency = (value) => {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0);
        };

        const formatUSD = (value) => {
            return '$' + (value || 0).toFixed(2).replace('.', ',');
        };

        const supabaseFetch = async (table, method = 'GET', data = null, filter = null) => {
            try {
                let url = `${SUPABASE_URL}/rest/v1/${table}?select=*`;
                if (filter) url += `&${filter}`;

                const options = {
                    method,
                    headers: {
                        apikey: SUPABASE_KEY,
                        Authorization: `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                    },
                };

                if (data) {
                    if (filter) {
                        options.headers['Prefer'] = 'return=representation';
                    }
                    options.body = JSON.stringify(data);
                }

                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error(`Supabase fetch error for ${table}:`, error);
                return null;
            }
        };

        // Header Component
        function Header({ onRefresh, exchangeRates, lastRefresh }) {
            const [currentTime, setCurrentTime] = useState(new Date());

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const timeStr = currentTime.toLocaleTimeString('pt-BR');
            const dateStr = currentTime.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            const usdRate = exchangeRates?.find(r => r.currency === 'USD')?.rate || 5.24;
            const eurRate = exchangeRates?.find(r => r.currency === 'EUR')?.rate || 6.05;

            return (
                <div className="header">
                    <div className="header-top">
                        <div className="header-left">
                            <span style={{ fontSize: '32px' }}>🍊</span>
                            <div>
                                <div className="header-title">Orange Finance</div>
                                <div className="header-subtitle">Gestão Financeira | Orange Viagens</div>
                            </div>
                        </div>
                        <div className="header-right">
                            <div className="header-time">{timeStr}</div>
                            <div className="header-time">{dateStr}</div>
                            <div className="header-refresh">
                                Última atualização: {lastRefresh ? new Date(lastRefresh).toLocaleTimeString('pt-BR') : 'Nunca'}
                            </div>
                            <button className="refresh-btn" onClick={onRefresh}>
                                🔄 Atualizar Dados
                            </button>
                        </div>
                    </div>
                    <div className="exchange-rates">
                        <div className="exchange-rate">
                            <span style={{ fontSize: '20px' }}>🇺🇸</span>
                            <div>
                                <div className="exchange-rate-label">USD</div>
                                <div className="exchange-rate-value">{usdRate.toFixed(4)}</div>
                            </div>
                        </div>
                        <div className="exchange-rate">
                            <span style={{ fontSize: '20px' }}>🇪🇺</span>
                            <div>
                                <div className="exchange-rate-label">EUR</div>
                                <div className="exchange-rate-value">{eurRate.toFixed(4)}</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Summary Cards Component
        function SummaryCards({ banks, creditLimits }) {
            const totalBrasil = banks
                .filter(b => b.category === 'banco_brasil')
                .reduce((sum, b) => sum + (b.balance_brl || 0), 0);

            const totalAdquirentes = banks
                .filter(b => b.category === 'adquirente')
                .reduce((sum, b) => sum + (b.balance_brl || 0), 0);

            const totalUSA = banks
                .filter(b => b.category === 'banco_usa')
                .reduce((sum, b) => sum + (b.balance_brl || 0), 0);

            const totalCredito = creditLimits.reduce((sum, c) => sum + (c.available_limit || 0), 0);

            const grandTotal = totalBrasil + totalAdquirentes + totalUSA;

            return (
                <div className="summary-row">
                    <div className="summary-card total">
                        <div className="label">Total Disponível</div>
                        <div className="value">{formatCurrency(grandTotal)}</div>
                    </div>
                    <div className="summary-card brasil">
                        <div className="label">Bancos Brasil</div>
                        <div className="value">{formatCurrency(totalBrasil)}</div>
                    </div>
                    <div className="summary-card adquirentes">
                        <div className="label">Adquirentes</div>
                        <div className="value">{formatCurrency(totalAdquirentes)}</div>
                    </div>
                    <div className="summary-card usa">
                        <div className="label">Bancos USA</div>
                        <div className="value">{formatCurrency(totalUSA)}</div>
                    </div>
                    <div className="summary-card credito">
                        <div className="label">Crédito Cartões</div>
                        <div className="value">{formatCurrency(totalCredito)}</div>
                    </div>
                </div>
            );
        }

        // Bank Accounts Table Component
        function BankAccountsTable({ banks, onUpdate }) {
            const [editingId, setEditingId] = useState(null);
            const [editValue, setEditValue] = useState('');
            const [isSaving, setIsSaving] = useState(false);

            const handleEdit = (id, value) => {
                setEditingId(id);
                setEditValue(value.toString());
            };

            const handleSave = async (id, field) => {
                setIsSaving(true);
                const numValue = parseFloat(editValue.replace(',', '.'));
                if (!isNaN(numValue)) {
                    const success = await onUpdate(id, { [field]: numValue });
                    if (success) {
                        setEditingId(null);
                    }
                }
                setIsSaving(false);
            };

            const groupedBanks = {
                banco_brasil: banks.filter(b => b.category === 'banco_brasil'),
                adquirente: banks.filter(b => b.category === 'adquirente'),
                banco_usa: banks.filter(b => b.category === 'banco_usa'),
            };

            const categoryLabels = {
                banco_brasil: 'Bancos Brasil',
                adquirente: 'Adquirentes',
                banco_usa: 'Bancos USA',
            };

            const categoryClass = {
                banco_brasil: 'brasil',
                adquirente: 'adquirentes',
                banco_usa: 'usa',
            };

            return (
                <div className="card">
                    <h2 className="section-title">Contas Bancárias</h2>
                    <div className="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Banco</th>
                                    <th className="currency-cell">Saldo BRL</th>
                                    <th className="currency-cell">Saldo USD</th>
                                </tr>
                            </thead>
                            <tbody>
                                {Object.entries(groupedBanks).map(([category, categoryBanks]) => {
                                    const subtotal = categoryBanks.reduce((sum, b) => sum + (b.balance_brl || 0), 0);
                                    return (
                                        <React.Fragment key={category}>
                                            <tr className={`category-header ${categoryClass[category]}`}>
                                                <td colSpan="3">{categoryLabels[category]}</td>
                                            </tr>
                                            {categoryBanks.map(bank => (
                                                <tr key={bank.id}>
                                                    <td className="text-cell">{bank.name}</td>
                                                    <td className="currency-cell">
                                                        {editingId === `${bank.id}-brl` ? (
                                                            <input
                                                                type="text"
                                                                className="editable"
                                                                value={editValue}
                                                                onChange={(e) => setEditValue(e.target.value)}
                                                                onBlur={() => handleSave(bank.id, 'balance_brl')}
                                                                onKeyDown={(e) => e.key === 'Enter' && handleSave(bank.id, 'balance_brl')}
                                                                autoFocus
                                                            />
                                                        ) : (
                                                            <span
                                                                style={{ cursor: 'pointer' }}
                                                                onClick={() => handleEdit(`${bank.id}-brl`, bank.balance_brl)}
                                                            >
                                                                {formatCurrency(bank.balance_brl)}
                                                            </span>
                                                        )}
                                                    </td>
                                                    <td className="currency-cell">
                                                        {category === 'banco_usa' ? (
                                                            editingId === `${bank.id}-usd` ? (
                                                                <input
                                                                    type="text"
                                                                    className="editable"
                                                                    value={editValue}
                                                                    onChange={(e) => setEditValue(e.target.value)}
                                                                    onBlur={() => handleSave(bank.id, 'balance_usd')}
                                                                    onKeyDown={(e) => e.key === 'Enter' && handleSave(bank.id, 'balance_usd')}
                                                                    autoFocus
                                                                />
                                                            ) : (
                                                                <span
                                                                    style={{ cursor: 'pointer' }}
                                                                    onClick={() => handleEdit(`${bank.id}-usd`, bank.balance_usd)}
                                                                >
                                                                    {formatUSD(bank.balance_usd)}
                                                                </span>
                                                            )
                                                        ) : (
                                                            '—'
                                                        )}
                                                    </td>
                                                </tr>
                                            ))}
                                            <tr className="subtotal-row">
                                                <td>Subtotal {categoryLabels[category]}</td>
                                                <td className="currency-cell">{formatCurrency(subtotal)}</td>
                                                <td className="currency-cell">—</td>
                                            </tr>
                                        </React.Fragment>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // Charts Component
        function Charts({ banks, creditLimits }) {
            const categoryData = useMemo(() => {
                const brasil = banks.filter(b => b.category === 'banco_brasil').reduce((sum, b) => sum + (b.balance_brl || 0), 0);
                const adquirentes = banks.filter(b => b.category === 'adquirente').reduce((sum, b) => sum + (b.balance_brl || 0), 0);
                const usa = banks.filter(b => b.category === 'banco_usa').reduce((sum, b) => sum + (b.balance_brl || 0), 0);
                return [
                    { name: 'Bancos Brasil', value: brasil, fill: '#3B82F6' },
                    { name: 'Adquirentes', value: adquirentes, fill: '#8B5CF6' },
                    { name: 'Bancos USA', value: usa, fill: '#EC4899' },
                ];
            }, [banks]);

            const topBanks = useMemo(() => {
                return banks
                    .sort((a, b) => (b.balance_brl || 0) - (a.balance_brl || 0))
                    .slice(0, 10)
                    .map(b => ({ name: b.name, value: b.balance_brl }));
            }, [banks]);

            return (
                <div className="charts-grid">
                    <div className="chart-container">
                        <h3 style={{ marginBottom: '16px', color: '#E2E8F0', fontWeight: '600' }}>Distribuição por Categoria</h3>
                        <ResponsiveContainer width="100%" height={300}>
                            <PieChart>
                                <Pie
                                    data={categoryData}
                                    cx="50%"
                                    cy="50%"
                                    labelLine={false}
                                    label={({ name, value }) => `${name}: ${formatCurrency(value)}`}
                                    outerRadius={80}
                                    fill="#8884d8"
                                    dataKey="value"
                                >
                                    {categoryData.map((entry, index) => (
                                        <Cell key={`cell-${index}`} fill={entry.fill} />
                                    ))}
                                </Pie>
                                <Tooltip formatter={(value) => formatCurrency(value)} />
                            </PieChart>
                        </ResponsiveContainer>
                    </div>
                    <div className="chart-container">
                        <h3 style={{ marginBottom: '16px', color: '#E2E8F0', fontWeight: '600' }}>Top 10 Bancos por Saldo</h3>
                        <ResponsiveContainer width="100%" height={300}>
                            <BarChart data={topBanks}>
                                <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                                <XAxis dataKey="name" stroke="#94A3B8" style={{ fontSize: '12px' }} />
                                <YAxis stroke="#94A3B8" style={{ fontSize: '12px' }} />
                                <Tooltip
                                    formatter={(value) => formatCurrency(value)}
                                    contentStyle={{ background: '#1E293B', border: '1px solid #334155', borderRadius: '6px' }}
                                    labelStyle={{ color: '#E2E8F0' }}
                                />
                                <Bar dataKey="value" fill="#F97316" />
                            </BarChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            );
        }

        // Credit Limits Table Component
        function CreditLimitsTable({ limits, onUpdate }) {
            const [editingId, setEditingId] = useState(null);
            const [editValue, setEditValue] = useState('');

            const handleEdit = (id, value) => {
                setEditingId(id);
                setEditValue(value.toString());
            };

            const handleSave = async (id) => {
                const numValue = parseFloat(editValue.replace(',', '.'));
                if (!isNaN(numValue)) {
                    const success = await onUpdate(id, { available_limit: numValue }, 'credit_limits');
                    if (success) {
                        setEditingId(null);
                    }
                }
            };

            const total = limits.reduce((sum, l) => sum + (l.available_limit || 0), 0);

            return (
                <div className="card">
                    <h2 className="section-title">Limites Cartão de Crédito</h2>
                    <div className="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Banco</th>
                                    <th className="currency-cell">Limite Disponível</th>
                                </tr>
                            </thead>
                            <tbody>
                                {limits.map(limit => (
                                    <tr key={limit.id}>
                                        <td className="text-cell">{limit.bank_name}</td>
                                        <td className="currency-cell">
                                            {editingId === limit.id ? (
                                                <input
                                                    type="text"
                                                    className="editable"
                                                    value={editValue}
                                                    onChange={(e) => setEditValue(e.target.value)}
                                                    onBlur={() => handleSave(limit.id)}
                                                    onKeyDown={(e) => e.key === 'Enter' && handleSave(limit.id)}
                                                    autoFocus
                                                />
                                            ) : (
                                                <span
                                                    style={{ cursor: 'pointer' }}
                                                    onClick={() => handleEdit(limit.id, limit.available_limit)}
                                                >
                                                    {formatCurrency(limit.available_limit)}
                                                </span>
                                            )}
                                        </td>
                                    </tr>
                                ))}
                                <tr className="total-row">
                                    <td>Total</td>
                                    <td className="currency-cell">{formatCurrency(total)}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // Receivables Table Component
        function ReceivablesTable({ receivables, onUpdate }) {
            const [editingId, setEditingId] = useState(null);
            const [editValue, setEditValue] = useState('');
            const [editField, setEditField] = useState('');

            const handleEdit = (id, field, value) => {
                setEditingId(id);
                setEditField(field);
                setEditValue(value.toString());
            };

            const handleSave = async (id) => {
                let updateData = {};
                if (editField === 'amount') {
                    updateData.amount = parseFloat(editValue.replace(',', '.'));
                } else if (editField === 'receive_date') {
                    updateData.receive_date = editValue;
                }
                const success = await onUpdate(id, updateData, 'receivables');
                if (success) {
                    setEditingId(null);
                }
            };

            const total = receivables.reduce((sum, r) => sum + (r.amount || 0), 0);

            return (
                <div className="card">
                    <h2 className="section-title">A Receber Adquirentes</h2>
                    <div className="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Origem</th>
                                    <th>Data</th>
                                    <th className="currency-cell">Valor</th>
                                </tr>
                            </thead>
                            <tbody>
                                {receivables.map(rec => (
                                    <tr key={rec.id}>
                                        <td className="text-cell">{rec.source}</td>
                                        <td>
                                            {editingId === rec.id && editField === 'receive_date' ? (
                                                <input
                                                    type="date"
                                                    className="editable"
                                                    value={editValue}
                                                    onChange={(e) => setEditValue(e.target.value)}
                                                    onBlur={() => handleSave(rec.id)}
                                                    onKeyDown={(e) => e.key === 'Enter' && handleSave(rec.id)}
                                                    autoFocus
                                                />
                                            ) : (
                                                <span
                                                    style={{ cursor: 'pointer' }}
                                                    onClick={() => handleEdit(rec.id, 'receive_date', rec.receive_date)}
                                                >
                                                    {new Date(rec.receive_date).toLocaleDateString('pt-BR')}
                                                </span>
                                            )}
                                        </td>
                                        <td className="currency-cell">
                                            {editingId === rec.id && editField === 'amount' ? (
                                                <input
                                                    type="text"
                                                    className="editable"
                                                    value={editValue}
                                                    onChange={(e) => setEditValue(e.target.value)}
                                                    onBlur={() => handleSave(rec.id)}
                                                    onKeyDown={(e) => e.key === 'Enter' && handleSave(rec.id)}
                                                    autoFocus
                                                />
                                            ) : (
                                                <span
                                                    style={{ cursor: 'pointer' }}
                                                    onClick={() => handleEdit(rec.id, 'amount', rec.amount)}
                                                >
                                                    {formatCurrency(rec.amount)}
                                                </span>
                                            )}
                                        </td>
                                    </tr>
                                ))}
                                <tr className="total-row">
                                    <td colSpan="2">Total</td>
                                    <td className="currency-cell">{formatCurrency(total)}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // Special Credits Table Component
        function SpecialCreditsTable({ specialCredits, banks }) {
            const totalSpecialCredits = specialCredits.reduce((sum, s) => sum + (s.credit_limit || 0), 0);
            const totalBanks = banks.reduce((sum, b) => sum + (b.balance_brl || 0), 0);
            const projectedBalance = totalBanks + totalSpecialCredits;

            return (
                <div className="card">
                    <h2 className="section-title">Créditos Especiais</h2>
                    <div className="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Banco</th>
                                    <th>Tipo</th>
                                    <th className="currency-cell">Limite</th>
                                </tr>
                            </thead>
                            <tbody>
                                {specialCredits.map(credit => (
                                    <tr key={credit.id}>
                                        <td className="text-cell">{credit.bank_name}</td>
                                        <td className="text-cell">{credit.credit_type}</td>
                                        <td className="currency-cell">{formatCurrency(credit.credit_limit)}</td>
                                    </tr>
                                ))}
                                <tr className="subtotal-row">
                                    <td colSpan="2">Subtotal Créditos</td>
                                    <td className="currency-cell">{formatCurrency(totalSpecialCredits)}</td>
                                </tr>
                                <tr className="total-row">
                                    <td colSpan="2">Saldo Projetado</td>
                                    <td className="currency-cell">{formatCurrency(projectedBalance)}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // Main App Component
        function App() {
            const [banks, setBanks] = useState(FALLBACK_BANKS);
            const [creditLimits, setCreditLimits] = useState(FALLBACK_CREDIT_LIMITS);
            const [receivables, setReceivables] = useState(FALLBACK_RECEIVABLES);
            const [exchangeRates, setExchangeRates] = useState(FALLBACK_EXCHANGE_RATES);
            const [specialCredits, setSpecialCredits] = useState(FALLBACK_SPECIAL_CREDITS);
            const [loading, setLoading] = useState(true);
            const [lastRefresh, setLastRefresh] = useState(null);
            const [message, setMessage] = useState('');

            const loadData = useCallback(async () => {
                setLoading(true);
                const [banksData, limitsData, receivablesData, ratesData, creditsData] = await Promise.all([
                    supabaseFetch('bank_accounts'),
                    supabaseFetch('credit_limits'),
                    supabaseFetch('receivables'),
                    supabaseFetch('exchange_rates'),
                    supabaseFetch('special_credits'),
                ]);

                if (banksData) setBanks(banksData);
                if (limitsData) setCreditLimits(limitsData);
                if (receivablesData) setReceivables(receivablesData);
                if (ratesData) setExchangeRates(ratesData);
                if (creditsData) setSpecialCredits(creditsData);

                setLastRefresh(new Date());
                setLoading(false);
            }, []);

            const handleUpdate = useCallback(async (id, data, table = 'bank_accounts') => {
                try {
                    const filter = `id=eq.${id}`;
                    const result = await supabaseFetch(table, 'PATCH', data, filter);

                    if (result && result.length > 0) {
                        if (table === 'bank_accounts') {
                            setBanks(prev => prev.map(b => b.id === id ? { ...b, ...data } : b));
                        } else if (table === 'credit_limits') {
                            setCreditLimits(prev => prev.map(l => l.id === id ? { ...l, ...data } : l));
                        } else if (table === 'receivables') {
                            setReceivables(prev => prev.map(r => r.id === id ? { ...r, ...data } : r));
                        }
                        setMessage('✅ Salvo com sucesso');
                        setTimeout(() => setMessage(''), 3000);
                        return true;
                    }
                    return false;
                } catch (error) {
                    console.error('Update error:', error);
                    return false;
                }
            }, []);

            useEffect(() => {
                loadData();
            }, [loadData]);

            if (loading) {
                return (
                    <div className="loading">
                        <div className="spinner"></div>
                        <p style={{ marginTop: '16px' }}>Carregando dados financeiros...</p>
                    </div>
                );
            }

            return (
                <div style={{ minHeight: '100vh', paddingBottom: '40px' }}>
                    <Header onRefresh={loadData} exchangeRates={exchangeRates} lastRefresh={lastRefresh} />
                    <div className="container">
                        {message && (
                            <div className="success" style={{ marginBottom: '16px' }}>
                                {message}
                            </div>
                        )}
                        <SummaryCards banks={banks} creditLimits={creditLimits} />
                        <BankAccountsTable banks={banks} onUpdate={handleUpdate} />
                        <Charts banks={banks} creditLimits={creditLimits} />
                        <CreditLimitsTable limits={creditLimits} onUpdate={handleUpdate} />
                        <ReceivablesTable receivables={receivables} onUpdate={handleUpdate} />
                        <SpecialCreditsTable specialCredits={specialCredits} banks={banks} />
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
