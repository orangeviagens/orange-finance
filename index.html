<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Finance – Painel Financeiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0A0A0F;
            --bg-card: #12121A;
            --bg-elevated: #1A1A25;
            --bg-glass: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.12);

            --orange-primary: #E8863A;
            --orange-light: #F2A65A;
            --orange-glow: rgba(232,134,58,0.12);
            --orange-subtle: rgba(232,134,58,0.06);

            --gold: #C9A96E;
            --gold-light: #D4B87A;

            --blue: #5B8DEF;
            --purple: #9B7AEF;
            --rose: #E87A9F;
            --emerald: #5BC4A0;
            --amber: #D4A853;

            --text-primary: #E8E6E1;
            --text-secondary: #8A8880;
            --text-muted: #5A5850;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--orange-primary);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--orange-light);
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-deep);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
            backdrop-filter: blur(10px);
            background: linear-gradient(to bottom, rgba(10, 10, 15, 0.95), rgba(10, 10, 15, 0.85));
        }

        .header-divider {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--orange-primary), transparent);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 0;
        }

        .header-logo {
            font-size: 36px;
            line-height: 1;
        }

        .header-brand {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .header-brand-main {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 1px;
            color: var(--text-primary);
        }

        .header-brand-sub {
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            font-size: 11px;
            letter-spacing: 0.5px;
            color: var(--gold);
        }

        .header-center {
            flex: 1;
            text-align: center;
            font-size: 13px;
            font-weight: 300;
            font-style: italic;
            color: var(--text-secondary);
            font-family: 'DM Sans', sans-serif;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 0;
        }

        .exchange-rates {
            display: flex;
            gap: 12px;
        }

        .exchange-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-secondary);
            transition: border-color 0.3s, background 0.3s;
        }

        .exchange-pill:hover {
            border-color: var(--orange-primary);
            background: var(--orange-subtle);
        }

        .exchange-flag {
            font-size: 14px;
        }

        .header-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .refresh-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            border-color: var(--orange-primary);
            color: var(--orange-primary);
            background: var(--orange-subtle);
        }

        .refresh-btn.spinning {
            animation: spin 0.8s linear;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        main {
            padding: 40px 32px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .section {
            opacity: 0;
            animation: fadeUp 0.6s ease forwards;
        }

        .section:nth-child(1) { animation-delay: 0.1s; }
        .section:nth-child(2) { animation-delay: 0.2s; }
        .section:nth-child(3) { animation-delay: 0.3s; }

        .hero-section {
            background: radial-gradient(circle at 50% 50%, var(--orange-subtle), transparent);
            padding: 48px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 48px;
            text-align: center;
        }

        .hero-label {
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 16px;
        }

        .hero-value {
            font-family: 'Playfair Display', serif;
            font-weight: 800;
            font-size: 56px;
            line-height: 1.1;
            color: var(--text-primary);
            margin-bottom: 8px;
            opacity: 0;
            animation: countUp 0.8s ease forwards;
            animation-delay: 0.3s;
        }

        .hero-subtitle {
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .hero-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
        }

        .metric {
            text-align: left;
            padding: 16px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all 0.3s;
        }

        .metric:hover {
            border-color: var(--orange-primary);
            background: var(--orange-subtle);
        }

        .metric-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .metric-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .metric-percent {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: 4px;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes countUp {
            from {
                opacity: 0;
                filter: blur(8px);
            }
            to {
                opacity: 1;
                filter: blur(0);
            }
        }

        .content-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
        }

        @media (max-width: 1200px) {
            .content-wrapper {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s;
        }

        .card:hover {
            border-color: var(--border-hover);
            box-shadow: 0 8px 32px rgba(232, 134, 58, 0.08);
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 18px;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .card-title.with-gold-line {
            border-bottom: 2px solid var(--gold);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 0;
        }

        thead {
            display: none;
        }

        tbody tr {
            opacity: 0;
            animation: fadeUp 0.3s ease forwards;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: background-color 0.2s;
        }

        tbody tr:nth-child(1) { animation-delay: 0.05s; }
        tbody tr:nth-child(2) { animation-delay: 0.1s; }
        tbody tr:nth-child(3) { animation-delay: 0.15s; }
        tbody tr:nth-child(4) { animation-delay: 0.2s; }
        tbody tr:nth-child(5) { animation-delay: 0.25s; }
        tbody tr:nth-child(6) { animation-delay: 0.3s; }
        tbody tr:nth-child(7) { animation-delay: 0.35s; }
        tbody tr:nth-child(8) { animation-delay: 0.4s; }
        tbody tr:nth-child(9) { animation-delay: 0.45s; }
        tbody tr:nth-child(10) { animation-delay: 0.5s; }
        tbody tr:nth-child(11) { animation-delay: 0.55s; }
        tbody tr:nth-child(12) { animation-delay: 0.6s; }
        tbody tr:nth-child(13) { animation-delay: 0.65s; }
        tbody tr:nth-child(14) { animation-delay: 0.7s; }
        tbody tr:nth-child(15) { animation-delay: 0.75s; }

        tbody tr:hover {
            background-color: var(--bg-elevated);
        }

        td {
            padding: 10px 16px;
            font-size: 13px;
            color: var(--text-primary);
        }

        td:first-child {
            border-left: 3px solid transparent;
            padding-left: 13px;
        }

        tr.category-brasil td:first-child {
            border-left-color: var(--blue);
            background: rgba(91, 141, 239, 0.03);
        }

        tr.category-adquirente td:first-child {
            border-left-color: var(--purple);
            background: rgba(155, 122, 239, 0.03);
        }

        tr.category-usa td:first-child {
            border-left-color: var(--rose);
            background: rgba(232, 122, 159, 0.03);
        }

        tr.category-credito td:first-child {
            border-left-color: var(--emerald);
            background: rgba(91, 196, 160, 0.03);
        }

        tr.subtotal {
            font-weight: 600;
            background: rgba(255, 255, 255, 0.02) !important;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        tr.total {
            background: transparent;
            border-top: 2px solid var(--orange-primary);
            border-bottom: 2px solid var(--orange-primary);
            font-weight: 700;
            font-size: 14px;
        }

        tr.total td:first-child {
            border-left-color: var(--orange-primary);
        }

        .bank-name {
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            color: var(--text-primary);
        }

        .value-brl {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 400;
            text-align: right;
            color: var(--text-primary);
        }

        .value-usd {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 400;
            font-size: 11px;
            color: var(--text-secondary);
            text-align: right;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 24px;
        }

        .mini-table {
            font-size: 12px;
        }

        .mini-table td {
            padding: 8px 12px;
        }

        .mini-table tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .mini-table .value-brl {
            color: var(--emerald);
        }

        footer {
            text-align: center;
            padding: 32px;
            color: var(--text-muted);
            font-size: 12px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            border-top: 1px solid var(--border);
            margin-top: 64px;
        }

        @media (max-width: 768px) {
            header {
                flex-wrap: wrap;
                padding: 12px 16px;
                height: auto;
                gap: 12px;
            }

            .header-left {
                flex: 1;
            }

            .header-center {
                flex: 1;
                font-size: 11px;
            }

            .header-right {
                flex: 1;
                gap: 8px;
            }

            .hero-section {
                padding: 32px 24px;
                margin-bottom: 32px;
            }

            .hero-value {
                font-size: 36px;
            }

            .hero-metrics {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            main {
                padding: 24px 16px;
            }

            .content-wrapper {
                gap: 24px;
            }

            .card {
                padding: 16px;
            }

            td {
                padding: 8px 12px;
                font-size: 11px;
            }

            .exchange-rates {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <div class="header-logo">🍊</div>
            <div class="header-brand">
                <div class="header-brand-main">Orange Finance</div>
                <div class="header-brand-sub">Orange Viagens</div>
            </div>
        </div>
        <div class="header-center" id="headerDate"></div>
        <div class="header-right">
            <div class="exchange-rates" id="exchangeRates"></div>
            <div class="header-time" id="headerTime"></div>
            <button class="refresh-btn" id="refreshBtn" title="Atualizar dados">🔄</button>
        </div>
        <div class="header-divider"></div>
    </header>

    <main>
        <section class="section hero-section">
            <div class="hero-label">Posição Financeira</div>
            <div class="hero-value" id="heroValue">R$ —</div>
            <div class="hero-subtitle" id="heroSubtitle">carregando...</div>
            <div class="hero-metrics" id="heroMetrics"></div>
        </section>

        <div class="content-wrapper">
            <div>
                <section class="section card">
                    <div class="card-title with-gold-line">Contas Bancárias</div>
                    <table id="banksTable">
                        <tbody id="banksTbody"></tbody>
                    </table>
                </section>

                <section class="section card" style="margin-top: 32px;">
                    <div class="card-title with-gold-line">Créditos Especiais</div>
                    <table id="creditsTable">
                        <tbody id="creditsTbody"></tbody>
                    </table>
                </section>
            </div>

            <div>
                <section class="section card">
                    <div class="card-title">Distribuição por Categoria</div>
                    <div class="chart-container">
                        <canvas id="distributionChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <canvas id="topAccountsChart"></canvas>
                    </div>
                </section>

                <section class="section card" style="margin-top: 32px;">
                    <div class="card-title" style="color: var(--amber);">Recebíveis</div>
                    <table class="mini-table">
                        <tbody id="receivablesTbody"></tbody>
                    </table>
                    <div style="padding-top: 12px; border-top: 1px solid var(--border); margin-top: 12px; text-align: right;">
                        <span style="font-family: 'JetBrains Mono'; font-size: 13px; font-weight: 600;" id="receivablesTotal">R$ —</span>
                    </div>
                </section>

                <section class="section card" style="margin-top: 32px;">
                    <div class="card-title" style="color: var(--emerald);">Cartões de Crédito</div>
                    <table class="mini-table">
                        <tbody id="cardsTbody"></tbody>
                    </table>
                    <div style="padding-top: 12px; border-top: 1px solid var(--border); margin-top: 12px; text-align: right;">
                        <span style="font-family: 'JetBrains Mono'; font-size: 13px; font-weight: 600;" id="cardsTotal">R$ —</span>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <footer id="footer"></footer>

    <script>

        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnaXhqcnVhb2dmY2p4cXZvaHV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MzU3NzksImV4cCI6MjA5MDIxMTc3OX0.0nif6IO0VBIAOO5QKCHBkEGTDlxanwJN0f9LrGNns2k';

            ],

        const formatCurrency = (value) => new Intl.NumberFormat('pt-BR', {
            style: 'currency', currency: 'BRL', minimumFractionDigits: 2, maximumFractionDigits: 2
        }).format(value);

        function updateHeader() {
            const now = new Date();
            const days = ['domingo', 'segunda-feira', 'terça-feira', 'quarta-feira', 'quinta-feira', 'sexta-feira', 'sábado'];
            const months = ['janeiro', 'fevereiro', 'março', 'abril', 'maio', 'junho', 'julho', 'agosto', 'setembro', 'outubro', 'novembro', 'dezembro'];
            const dateStr = `${days[now.getDay()]}, ${now.getDate()} de ${months[now.getMonth()]} de ${now.getFullYear()}`;
            document.getElementById('headerDate').textContent = dateStr;
            document.getElementById('headerTime').textContent = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        async function fetchData() {
            try {
                const [banksRes, creditsRes, specialRes, receivablesRes] = await Promise.all([
                    fetch(`${SUPABASE_URL}/rest/v1/bank_accounts`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }),
                    fetch(`${SUPABASE_URL}/rest/v1/credit_limits`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }),
                    fetch(`${SUPABASE_URL}/rest/v1/special_credits`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }),
                    fetch(`${SUPABASE_URL}/rest/v1/receivables`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } })
                ]);
                if (!banksRes.ok) throw new Error('API Error');
                return {
                    banks: (await banksRes.json()) || FALLBACK_DATA.banks,
                    credits: (await creditsRes.json()) || FALLBACK_DATA.credits,
                    special_credits: (await specialRes.json()) || FALLBACK_DATA.special_credits,
                    receivables: (await receivablesRes.json()) || FALLBACK_DATA.receivables
                };
            } catch (e) {
                console.warn('Using fallback data:', e);
                return FALLBACK_DATA;
            }
        }

        function renderBanksTable(banks) {
            const tbody = document.getElementById('banksTbody');
            tbody.innerHTML = '';
            const categories = { brasil: { label: 'Bancos Brasil', banks: [] }, adquirente: { label: 'Adquirentes', banks: [] }, usa: { label: 'Bancos USA', banks: [] } };
            banks.forEach(bank => { if (categories[bank.category]) categories[bank.category].banks.push(bank); });
            let grandTotal = 0;
            Object.values(categories).forEach((cat) => {
                if (cat.banks.length === 0) return;
                let categoryTotal = 0;
                cat.banks.forEach(bank => {
                    categoryTotal += bank.balance_brl;
                    const row = document.createElement('tr');
                    row.className = `category-${['brasil', 'adquirente', 'usa'].includes(cat.label === 'Bancos Brasil' ? 'brasil' : cat.label === 'Adquirentes' ? 'adquirente' : 'usa') ? (cat.label === 'Bancos Brasil' ? 'brasil' : cat.label === 'Adquirentes' ? 'adquirente' : 'usa') : ''}`;
                    row.innerHTML = `<td class="bank-name">${bank.name}</td><td class="value-brl">${formatCurrency(bank.balance_brl)}</td><td class="value-usd">${bank.balance_usd > 0 ? formatCurrency(bank.balance_usd) : ''}</td>`;
                    tbody.appendChild(row);
                });
                const subtotalRow = document.createElement('tr');
                subtotalRow.className = 'subtotal';
                subtotalRow.innerHTML = `<td>${cat.label}</td><td class="value-brl">${formatCurrency(categoryTotal)}</td><td></td>`;
                tbody.appendChild(subtotalRow);
                grandTotal += categoryTotal;
            });
            const totalRow = document.createElement('tr');
            totalRow.className = 'total';
            totalRow.innerHTML = `<td>Total Disponível</td><td class="value-brl">${formatCurrency(grandTotal)}</td><td></td>`;
            tbody.appendChild(totalRow);
            return grandTotal;
        }

        function renderCreditsTable(specialCredits) {
            const tbody = document.getElementById('creditsTbody');
            tbody.innerHTML = '';
            let total = 0;
            specialCredits.forEach(credit => {
                total += credit.credit_limit;
                const row = document.createElement('tr');
                row.className = 'category-credito';
                row.innerHTML = `<td class="bank-name">${credit.institution} / ${credit.description}</td><td class="value-brl">${formatCurrency(credit.credit_limit)}</td>`;
                tbody.appendChild(row);
            });
            const totalRow = document.createElement('tr');
            totalRow.className = 'total';
            totalRow.innerHTML = `<td>Total Créditos</td><td class="value-brl">${formatCurrency(total)}</td>`;
            tbody.appendChild(totalRow);
            return total;
        }

        function renderReceivables(receivables) {
            const tbody = document.getElementById('receivablesTbody');
            tbody.innerHTML = '';
            let total = 0;
            receivables.forEach(rec => {
                if (rec.amount > 0) {
                    total += rec.amount;
                    const row = document.createElement('tr');
                    row.innerHTML = `<td>${rec.source}</td><td>${new Date(rec.receive_date).toLocaleDateString('pt-BR')}</td><td class="value-brl">${formatCurrency(rec.amount)}</td>`;
                    tbody.appendChild(row);
                }
            });
            document.getElementById('receivablesTotal').textContent = formatCurrency(total);
        }

        function renderCards(credits) {
            const tbody = document.getElementById('cardsTbody');
            tbody.innerHTML = '';
            let total = 0;
            credits.forEach(card => {
                total += card.limit;
                const row = document.createElement('tr');
                row.innerHTML = `<td>${card.name}</td><td class="value-brl">${formatCurrency(card.limit)}</td>`;
                tbody.appendChild(row);
            });
            document.getElementById('cardsTotal').textContent = formatCurrency(total);
            return total;
        }

        function renderHeroMetrics(banks, totalAvailable, totalCredits) {
            const metrics = document.getElementById('heroMetrics');
            metrics.innerHTML = '';
            const categories = { brasil: { label: 'Bancos Brasil', emoji: '🔵', total: 0 }, adquirente: { label: 'Adquirentes', emoji: '🟣', total: 0 }, usa: { label: 'Bancos USA', emoji: '🩷', total: 0 }, credito: { label: 'Crédito Cartões', emoji: '🟢', total: 0 } };
            banks.forEach(bank => { if (categories[bank.category]) categories[bank.category].total += bank.balance_brl; });
            categories.credito.total = totalCredits;
            Object.entries(categories).filter(([_, v]) => v.total > 0).forEach(([key, cat]) => {
                const percent = key === 'credito' ? 0 : ((cat.total / totalAvailable) * 100).toFixed(1);
                const div = document.createElement('div');
                div.className = 'metric';
                div.innerHTML = `<div class="metric-label">${cat.emoji} ${cat.label}</div><div class="metric-value">${formatCurrency(cat.total)}<span class="metric-percent">${key !== 'credito' ? '(' + percent + '%)' : ''}</span></div>`;
                metrics.appendChild(div);
            });
        }

        let distributionChart, topAccountsChart;

        function renderCharts(banks) {
            const categories = { brasil: 0, adquirente: 0, usa: 0 };
            banks.forEach(bank => { if (categories[bank.category] !== undefined) categories[bank.category] += bank.balance_brl; });
            const labels = ['Bancos Brasil', 'Adquirentes', 'Bancos USA'];
            const data = [categories.brasil, categories.adquirente, categories.usa];
            const colors = ['#5B8DEF', '#9B7AEF', '#E87A9F'];
            const distCtx = document.getElementById('distributionChart').getContext('2d');
            if (distributionChart) distributionChart.destroy();
            distributionChart = new Chart(distCtx, { type: 'doughnut', data: { labels, datasets: [{ data, backgroundColor: colors, borderColor: '#12121A', borderWidth: 2 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
            const topBanks = [...banks].sort((a, b) => b.balance_brl - a.balance_brl).slice(0, 8);
            const topCtx = document.getElementById('topAccountsChart').getContext('2d');
            if (topAccountsChart) topAccountsChart.destroy();
            topAccountsChart = new Chart(topCtx, { type: 'bar', data: { labels: topBanks.map(b => b.name), datasets: [{ label: 'Saldo', data: topBanks.map(b => b.balance_brl), backgroundColor: topBanks.map(b => b.category === 'brasil' ? '#5B8DEF' : b.category === 'adquirente' ? '#9B7AEF' : '#E87A9F'), borderColor: '#12121A', borderWidth: 1 }] }, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#8A8880' } }, y: { grid: { display: false }, ticks: { color: '#8A8880' } } } } });
        }

        function renderExchangeRates() {
            const container = document.getElementById('exchangeRates');
            container.innerHTML = '';
            const rates = { USD: 5.2390, EUR: 6.0496 };
            Object.entries(rates).forEach(([code, rate]) => {
                const pill = document.createElement('div');
                pill.className = 'exchange-pill';
                const flag = code === 'USD' ? '🇺🇸' : '🇪🇺';
                pill.innerHTML = `<span class="exchange-flag">${flag}</span> ${code}: ${rate.toFixed(4)}`;
                container.appendChild(pill);
            });
        }

        function updateFooter() {
            const now = new Date();
            const timeStr = now.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('footer').textContent = `Orange Finance v3.0 · Atualizado em: ${timeStr}`;
        }

        async function render() {
            document.getElementById('refreshBtn').classList.add('spinning');
            const data = await fetchData();
            const totalBanks = renderBanksTable(data.banks);
            const totalCredits = renderCreditsTable(data.special_credits);
            const totalCards = renderCards(data.credits);
            document.getElementById('heroSubtitle').textContent = `disponível em ${data.banks.length} contas`;
            document.getElementById('heroValue').textContent = formatCurrency(totalBanks + totalCredits);
            renderHeroMetrics(data.banks, totalBanks, totalCards);
            renderCharts(data.banks);
            renderReceivables(data.receivables);
            renderExchangeRates();
            updateHeader();
            updateFooter();
            document.getElementById('refreshBtn').classList.remove('spinning');
        }

        render();
        setInterval(updateHeader, 1000);
        document.getElementById('refreshBtn').addEventListener('click', render);
    </script>
</body>
</html>
